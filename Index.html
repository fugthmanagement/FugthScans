<body>
  <div class="site">
    <aside class="sidebar">
      <div class="brand"><div class="logo"><div class="flame">🔥</div><div><h1>Infernia Reader</h1><p>Web novel + color manwah/webtoon reader for GitHub Pages.</p></div></div></div>
      <div class="side-panel"><label>Story</label><select id="storySelect"></select><div class="row" style="margin-top:.65rem"><button id="reloadBtn" class="primary">Refresh</button><button id="setupBtn">Setup</button></div></div>
      <div class="side-panel"><label>Reading mode</label><div class="mode-toggle"><button id="novelModeBtn" class="active">Web Novel</button><button id="manwahModeBtn">Manwah</button></div></div>
      <div class="side-panel"><input id="searchBox" placeholder="Search chapters..." /></div>
      <div id="chapterList" class="chapter-list"></div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div class="story-title"><h2 id="activeTitle">Loading...</h2><div id="activeSub">Select a story and chapter</div></div>
        <div class="group"><button id="prevBtn">← Prev</button><button id="nextBtn">Next →</button><button id="topBtn">↑ Top</button></div>
        <div class="group"><button id="playBtn" class="primary">▶ Play</button><button id="pauseBtn">⏸ Pause</button><button id="stopBtn">■ Stop</button><button id="backSpeechBtn">⟲ Back</button><button id="forwardSpeechBtn">Forward ⟳</button><button id="themeBtn">🌙</button></div>
      </div>
      <div class="reader-shell">
        <div class="progress-wrap"><div id="progress" class="progress"></div></div>
        <section class="reader-tools">
          <div><label>Voice</label><select id="voiceSelect"></select></div>
          <div><label>Speed <span id="rateLabel">1.0</span></label><input id="rate" type="range" min="0.55" max="1.9" value="1" step="0.05" /></div>
          <div><label>Font size <span id="fontLabel">18</span>px</label><input id="fontSize" type="range" min="15" max="30" value="18" step="1" /></div>
          <div><label>Width <span id="widthLabel">920</span>px</label><input id="readerWidth" type="range" min="640" max="1250" value="920" step="10" /></div>
          <div id="manwahControls" class="full" style="display:none"><div class="grid4"><div><label>Panel gap <span id="gapLabel">10</span>px</label><input id="panelGap" type="range" min="0" max="40" value="10" step="1" /></div><div><label>Fit</label><select id="fitSelect"><option value="full">Full width webtoon</option><option value="page">Page-like centered</option></select></div><div><label>Auto-scroll speed</label><select id="autoSpeed"><option value="0">Off</option><option value="0.6">Slow</option><option value="1.2">Medium</option><option value="2.0">Fast</option></select></div><div><label>Panel captions</label><select id="captionMode"><option value="show">Show</option><option value="hide">Hide</option></select></div></div></div>
        </section>
        <section class="soundbar"><button id="readSelectedBtn" class="small">Read selected</button><button id="readChapterBtn" class="small">Read chapter</button><button id="readFromHereBtn" class="small">Read from here</button><div class="grow">Sound: <span id="speechStatus" class="now">idle</span></div></section>
        <section id="setupPanel" class="drawer"></section>
        <article id="reader"></article>
        <section id="jsonBuilder" class="drawer"><h3>JSON Builder</h3><p class="hint">Double-click the story title to open this. Build a web novel chapter JSON, then upload it and add it to manifest.json.</p><div class="grid4"><div><label>Arc</label><input id="bArc" value="Arc 1" /></div><div><label>Rank</label><input id="bRank" type="number" value="1" /></div><div><label>Chapter</label><input id="bChapter" type="number" value="1" /></div><div><label>Filename</label><input id="bFile" value="chap1.json" /></div></div><div style="margin-top:.8rem"><label>Title</label><input id="bTitle" value="New Chapter" /></div><div style="margin-top:.8rem"><label>Content</label><textarea id="bContent">Paste chapter text here.</textarea></div><div class="row" style="margin-top:.8rem"><button id="downloadJsonBtn" class="primary">Download JSON</button><button id="copyJsonBtn">Copy JSON</button><button id="closeBuilderBtn">Close</button></div><p class="hint">Add this to the novel manifest: <span id="manifestLine" class="mono"></span></p></section>
      </div>
    </main>
  </div>
  <div id="toast" class="toast"></div>
  <script>
    const SETTINGS_KEY="infernia_webtoon_reader_settings_v1";
    const DEFAULT_STORY={id:"maelstory",title:"Mael Story",folder:"maelstory",manifest:"manifest.json",manwahManifest:"manwah/manifest.json"};

    init();
    async function init(){loadSettings();bindEvents();loadVoices();if("speechSynthesis"in window)speechSynthesis.onvoiceschanged=loadVoices;await loadStories();await loadCurrentStory();updateBuilderLine()}
    function bindEvents(){els.storySelect.addEventListener("change",async()=>{currentStory=stories.find(s=>s.id===els.storySelect.value)||stories[0]||DEFAULT_STORY;currentIndex=0;saveSettings();await loadCurrentStory()});els.reloadBtn.addEventListener("click",async()=>{cacheBust=Date.now();await loadStories();await loadCurrentStory();toast("JSON refreshed.")});els.setupBtn.addEventListener("click",()=>{els.setupPanel.classList.toggle("show");fillSetup()});els.novelModeBtn.addEventListener("click",()=>switchMode("novel"));els.manwahModeBtn.addEventListener("click",()=>switchMode("manwah"));els.searchBox.addEventListener("input",renderChapterList);els.prevBtn.addEventListener("click",()=>changeChapter(currentIndex-1));els.nextBtn.addEventListener("click",()=>changeChapter(currentIndex+1));els.topBtn.addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));els.playBtn.addEventListener("click",()=>speakText(getChapterSpeechText()));els.pauseBtn.addEventListener("click",pauseResumeSpeech);els.stopBtn.addEventListener("click",stopSpeech);els.backSpeechBtn.addEventListener("click",()=>jumpSpeech(-2));els.forwardSpeechBtn.addEventListener("click",()=>jumpSpeech(2));els.readSelectedBtn.addEventListener("click",()=>{const s=window.getSelection().toString().trim();s?speakText(s):toast("Select text first.")});els.readChapterBtn.addEventListener("click",()=>speakText(getChapterSpeechText()));els.readFromHereBtn.addEventListener("click",()=>{const s=window.getSelection().toString().trim();s?speakText(s):speakText(getChapterSpeechText())});els.themeBtn.addEventListener("click",toggleTheme);els.rate.addEventListener("input",()=>{els.rateLabel.textContent=Number(els.rate.value).toFixed(2);saveSettings()});els.fontSize.addEventListener("input",()=>{applySettings();saveSettings()});els.readerWidth.addEventListener("input",()=>{applySettings();saveSettings();renderCurrent()});els.panelGap.addEventListener("input",()=>{applySettings();saveSettings()});els.fitSelect.addEv     async function loadStories(){try{stories=normalizeStories(await fetchJSON("./stories.json"))}catch(e){stories=[DEFAULT_STORY]}if(!stories.length)stories=[DEFAULT_STORY];const p=new URLSearchParams(location.search),req=p.get("story"),saved=getSettings().storyId;currentStory=stories.find(s=>s.id===req)||stories.find(s=>s.id===saved)||stories[0]||DEFAULT_STORY;renderStorySelect()}
    function normalizeStories(raw){const arr=Array.isArray(raw)?raw:(raw&&Array.isArray(raw.stories)?raw.stories:[]);return arr.map((s,i)=>typeof s==="string"?{id:s,title:s,folder:s,manifest:"manifest.json",manwahManifest:"manwah/manifest.json"}:{id:s.id||s.folder||("story"+i),title:s.title||s.name||s.id||s.folder||("Story "+(i+1)),folder:s.folder||s.id||"",manifest:s.manifest||"manifest.json",manwahManifest:s.manwahManifest||"manwah/manifest.json"}).filter(s=>s.folder)}

    async function loadCurrentStory(){stopSpeech();stopAutoScroll();novelChapters=[];manwahChapters=[];currentManwahImages=[];els.reader.innerHTML=`<div class="notice">Loading ${escapeHTML(currentStory.title)}...</div>`;await Promise.allSettled([loadNovelChapters(),loadManwahChapters()]);currentIndex=Math.min(currentIndex,Math.max(0,getCurrentList().length-1));renderChapterList();await renderCurrent();saveSettings()}
    async function loadNovelChapters(){try{const f=trimSlashes(currentStory.folder),refs=normalizeManifest(await fetchJSON(`./${f}/${currentStory.manifest||"manifest.json"}`)),loaded=[];for(let i=0;i<refs.length;i++){const r=refs[i];try{loaded.push(normalizeNovelChapter(await fetchJSON(`./${f}/${r.file}`),r,i,`${f}/${r.file}`))}catch(e){loaded.push({id:"missing_novel_"+i,arc:"Missing file",rank:r.rank??i+1,chapter:r.chapter??i+1,title:r.title||r.file,content:`Could not load ${f}/${r.file}. Check manifest.json.`,path:`${f}/${r.file}`})}}novelChapters=loaded.sort(sortByRank)}catch(e){novelChapters=[]}}

    function normalizeManwahManifest(raw){const arr=Array.isArray(raw)?raw:(raw&&Array.isArray(raw.chapters)?raw.chapters:[]);return arr.map((x,i)=>typeof x==="string"?{folder:x,title:x,rank:i+1,chapter:i+1}:{id:x.id,title:x.title||("Chapter "+(x.chapter??i+1)),arc:x.arc||currentStory.title||"",rank:Number(x.rank??x.order??i+1),chapter:Number(x.chapter??i+1),folder:x.folder||"",file:x.file||"",images:x.images||null,scenes:x.scenes||x.subchapters||null,summary:x.summary||""})}

    function resolveImagePath(src,prefix){if(!src)return"";if(/^https?:\/\//i.test(src)||src.startsWith("./")||src.startsWith("/"))return src;return prefix+src}function sortByRank(a,b){return Number(a.rank??999999)-Number(b.rank??999999)||Number(a.chapter??999999)-Number(b.chapter??999999)}function contentToString(c){return Array.isArray(c)?c.join("\n\n"):String(c||"")}function getCurrentList(){return mode==="novel"?novelChapters:manwahChapters}
    async function switchMode(m){if(mode===m)return;stopSpeech();stopAutoScroll();mode=m;currentIndex=0;els.novelModeBtn.classList.toggle("active",mode==="novel");els.manwahModeBtn.classList.toggle("active",mode==="manwah");els.manwahControls.style.display=mode==="manwah"?"block":"none";saveSettings();renderChapterList();await renderCurrent();window.scrollTo({top:0,behavior:"smooth"})}
    function renderChapterList(){const list=getCurrentList(),q=els.searchBox.value.trim().toLowerCase();els.chapterList.innerHTML="";if(!list.length){els.chapterList.innerHTML=`<div class="hint" style="padding:.9rem">No ${mode==="novel"?"web novel":"manwah"} chapters loaded. Click Setup.</div>`;return}list.forEach((ch,i)=>{const hay=`${ch.arc||""} ${ch.title||""} ${ch.summary||""} ${ch.content||""} ${ch.path||""}`.toLowerCase();if(q&&!hay.includes(q))return;const b=document.createElement("button");b.className="chapter-item"+(i===currentIndex?" active":"");b.innerHTML=`<strong>${escapeHTML(ch.title||("Chapter "+(i+1)))}</strong><small>${mode==="novel"?"Web Novel":"Manwah"} · Rank ${escapeHTML(ch.rank??i+1)} · Ch ${escapeHTML(ch.chapter??i+1)}</small>`;b.onclick=()=>changeChapter(i);els.chapterList.appendChild(b)})}
    async function changeChapter(i){const list=getCurrentList();if(i<0||i>=list.length)return;currentIndex=i;stopSpeech();stopAutoScroll();await renderCurrent();renderChapterList();window.scrollTo({top:0,behavior:"smooth"})}
    async function renderCurrent(){if(mode==="novel")renderNovel();else await renderManwah();updateHeader();updateProgress()}
    function updateHeader(){const list=getCurrentList(),ch=list[currentIndex];els.activeTitle.textContent=currentStory.title||"Story";els.activeSub.textContent=ch?`${mode==="novel"?"Web Novel":"Manwah"} · ${ch.title||""}`:`No ${mode} chapters`;els.prevBtn.disabled=currentIndex<=0;els.nextBtn.disabled=currentIndex>=list.length-1||!list.length}
    function renderNovel(){const ch=novelChapters[currentIndex];els.reader.className="novel-reader";if(!ch){els.reader.innerHTML=setupNotice("No web novel chapters found.","Add chapter JSON files and list them in manifest.json.");return}const ps=ch.content.trim()?ch.content.split(/\n{2,}/).map(p=>`<p>${escapeHTML(p)}</p>`).join(""):`<div class="notice">This chapter has no content.</div>`;els.reader.innerHTML=`<h1>${escapeHTML(ch.title)}</h1><div class="meta">${escapeHTML(ch.arc||currentStory.title)} · Chapter ${escapeHTML(ch.chapter??currentIndex+1)} · ${escapeHTML(ch.path||"")}</div>${ch.summary?`<div class="notice"><strong>Summary:</strong> ${escapeHTML(ch.summary)}</div>`:""}${ps}`}
    async function renderManwah(){const ch=manwahChapters[currentIndex];els.reader.className="webtoon-reader";if(!ch){els.reader.innerHTML=setupNotice("No manwah chapters found.",`Add ${currentStory.folder}/manwah/manifest.json and image chapter folders.`);return}currentManwahImages=await loadManwahImages(ch);const showCap=els.captionMode.value!=="hide";let last="";const panels=currentManwahImages.map((img,i)=>{if(img.error)return`<div class="notice">${escapeHTML(img.caption)}</div>`;const sc=img.sceneTitle&&img.sceneTitle!==last?(last=img.sceneTitle,`<div class="scene-title">${escapeHTML(img.sceneTitle)}</div>`):"";const cap=showCap&&img.caption?`<div class="panel-caption">${escapeHTML(img.caption)}</div>`:"";return`${sc}<div class="panel"><img loading="lazy" src="${escapeHTML(img.src)}" alt="${escapeHTML(img.caption||ch.title||"Manwah panel")}">${cap}</div>`}).join("");els.reader.innerHTML=`<div class="webtoon-header"><h1>${escapeHTML(ch.title)}</h1><div class="meta">${escapeHTML(ch.arc||currentStory.title)} · Manwah Chapter ${escapeHTML(ch.chapter??currentIndex+1)} · ${currentManwahImages.length} panels</div>${ch.summary?`<div class="notice"><strong>Summary:</strong> ${escapeHTML(ch.summary)}</div>`:""}</div><div class="webtoon-stage">${panels}</div>`;handleAutoScroll()}
    function setupNotice(t,b){return`<div class="notice"><strong>${escapeHTML(t)}</strong><br><br>${escapeHTML(b)}<br><br>Click <strong>Setup</strong> for exact folder examples.</div>`}
    function getChapterSpeechText(){if(mode==="novel"){const ch=novelChapters[currentIndex];return ch?`${ch.arc}. ${ch.title}. ${ch.summary||""}. ${ch.content}`:""}const ch=manwahChapters[currentIndex],caps=currentManwahImages.map((x,i)=>x.caption?`Panel ${i+1}. ${x.caption}`:"").filter(Boolean).join(". ");return ch?`${ch.arc||currentStory.title}. ${ch.title}. ${ch.summary||""}. ${caps||"No panel captions available."}`:""}
    function speakText(text){if(!("speechSynthesis"in window)){toast("Text-to-speech not supported.");return}text=cleanSpeechText(text||"");if(!text){toast("Nothing to read.");return}stopSpeech();utterQueue=splitSpeech(text);utterIndex=0;els.speechStatus.textContent=`reading 1/${utterQueue.length}`;speakNext()}
    function splitSpeech(text){const ss=text.match(/[^.!?]+[.!?]+|[^.!?]+$/g)||[text],chunks=[];let cur="";for(const s of ss){if((cur+" "+s).length>250){if(cur.trim())chunks.push(cur.trim());cur=s}else cur+=" "+s}if(cur.trim())chunks.push(cur.trim());return chunks}
    function speakNext(){if(utterIndex>=utterQueue.length){els.speechStatus.textContent="finished";return}const u=new SpeechSynthesisUtterance(utterQueue[utterIndex]),v=speechSynthesis.getVoices().find(v=>v.name===els.voiceSelect.value);if(v)u.voice=v;u.rate=Number(els.rate.value||1);u.pitch=1;u.onend=()=>{utterIndex++;els.speechStatus.textContent=utterIndex<utterQueue.length?`reading ${utterIndex+1}/${utterQueue.length}`:"finished";speakNext()};u.onerror=()=>{utterIndex++;speakNext()};speechSynthesis.speak(u)}
    function pauseResumeSpeech(){if(!("speechSynthesis"in window))return;if(speechSynthesis.speaking&&!speechSynthesis.paused){speechSynthesis.pause();els.speechStatus.textContent="paused"}else if(speechSynthesis.paused){speechSynthesis.resume();els.speechStatus.textContent=`reading ${Math.min(utterIndex+1,utterQueue.length)}/${utterQueue.length}`}else speakText(getChapterSpeechText())}
    function stopSpeech(){if("speechSynthesis"in window)speechSynthesis.cancel();utterQueue=[];utterIndex=0;els.speechStatus.textContent="idle"}function jumpSpeech(d){if(!utterQueue.length){speakText(getChapterSpeechText());return}utterIndex=Math.max(0,Math.min(utterQueue.length-1,utterIndex+d));if("speechSynthesis"in window)speechSynthesis.cancel();els.speechStatus.textContent=`reading ${utterIndex+1}/${utterQueue.length}`;speakNext()}function cleanSpeechText(t){return String(t).replace(/[•#*_`>\[\]{}]/g," ").replace(/\s+/g," ").trim()}
    function loadVoices(){if(!("speechSynthesis"in window)){els.voiceSelect.innerHTML=`<option>Speech unsupported</option>`;return}const saved=getSettings().voice||"",voices=speechSynthesis.getVoices();els.voiceSelect.innerHTML="";voices.forEach(v=>{const o=document.createElement("option");o.value=v.name;o.textContent=`${v.name} (${v.lang})`;if(v.name===saved)o.selected=true;els.voiceSelect.appendChild(o)})}
    function handleAutoScroll(){stopAutoScroll();const speed=Number(els.autoSpeed.value||0);if(mode!=="manwah"||speed<=0)return;autoScrollTimer=setInterval(()=>{window.scrollBy(0,speed);if(window.innerHeight+window.scrollY>=document.documentElement.scrollHeight-4)stopAutoScroll()},16)}function stopAutoScroll(){if(autoScrollTimer)clearInterval(autoScrollTimer);autoScrollTimer=null}
    function fillSetup(){const f=currentStory.folder||"maelstory";els.setupPanel.innerHTML=`<h3>Folder setup</h3><p class="hint">GitHub Pages cannot scan folders, so manifests control order. Add files, update manifests, commit, then press Refresh.</p><strong>Root files</strong><div class="pre">index.html\nstories.json\n${f}/manifest.json\n${f}/chap1.json\n${f}/manwah/manifest.json\n${f}/manwah/chap1/manifest.json\n${f}/manwah/chap1/001.png\n${f}/manwah/chap1/002.png</div><strong>stories.json</strong><div class="pre">[\n  {"id":"${escapeHTML(currentStory.id||"maelstory")}","title":"${escapeHTML(currentStory.title||"Mael Story")}","folder":"${escapeHTML(f)}"}\n]</div><strong>${escapeHTML(f)}/manifest.json</strong><div class="pre">[\n  "chap1.json",\n  "chap2.json"\n]</div><strong>${escapeHTML(f)}/chap1.json</strong><div class="pre">{\n  "arc":"Arc 1",\n  "rank":1,\n  "chapter":1,\n  "title":"The Stable Age",\n  "content":["Paragraph one.","Paragraph two."]\n}</div><strong>${escapeHTML(f)}/manwah/manifest.json</strong><div class="pre">[\n  {"rank":1,"chapter":1,"title":"The Stable Age","folder":"chap1"}\n]</div><strong>${escapeHTML(f)}/manwah/chap1/manifest.json</strong><div class="pre">{\n  "title":"The Stable Age",\n  "images":[\n    {"src":"001.png","caption":"New Seoul morning opening shot."},\n    {"src":"002.png","caption":"Ten Stars meeting room."},\n    "003.png"\n  ]\n}</div><p class="hint">Images can be PNG, JPG, JPEG, WEBP, or GIF. Put them in the matching manwah chapter folder.</p>`}
    function buildChapterJSON(){return{arc:els.bArc.value.trim(),rank:Number(els.bRank.value||0),chapter:Number(els.bChapter.value||0),title:els.bTitle.value.trim()||"Untitled",content:els.bContent.value.split(/\n{2,}/).map(x=>x.trim()).filter(Boolean)}}function updateBuilderLine(){els.manifestLine.textContent=`"${sanitizeFilename(els.bFile.value.trim()||"chap1.json")}"`}function downloadChapterJson(){downloadText(sanitizeFilename(els.bFile.value.trim()||"chap1.json"),JSON.stringify(buildChapterJSON(),null,2),"application/json");toast("Chapter JSON downloaded.")}async function copyChapterJson(){const t=JSON.stringify(buildChapterJSON(),null,2);try{await navigator.clipboard.writeText(t);toast("JSON copied.")}catch(e){alert(t)}}function downloadText(name,text,type){const blob=new Blob([text],{type}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href)}
    async function fetchJSON(path){const sep=path.includes("?")?"&":"?",res=await fetch(path+sep+"v="+cacheBust,{cache:"no-store"});if(!res.ok)throw new Error(`${res.status} ${res.statusText}: ${path}`);return await res.json()}
    function loadSettings(){const s=getSettings();if(s.theme)document.documentElement.dataset.theme=s.theme;if(s.mode)mode=s.mode;if(s.fontSize)els.fontSize.value=s.fontSize;if(s.readerWidth)els.readerWidth.value=s.readerWidth;if(s.rate)els.rate.value=s.rate;if(s.panelGap)els.panelGap.value=s.panelGap;if(s.fitSelect)els.fitSelect.value=s.fitSelect;if(s.captionMode)els.captionMode.value=s.captionMode;if(s.autoSpeed)els.autoSpeed.value=s.autoSpeed;els.novelModeBtn.classList.toggle("active",mode==="novel");els.manwahModeBtn.classList.toggle("active",mode==="manwah");els.manwahControls.style.display=mode==="manwah"?"block":"none";applySettings()}function getSettings(){try{return JSON.parse(localStorage.getItem(SETTINGS_KEY)||"{}")}catch(e){return{}}}function saveSettings(){localStorage.setItem(SETTINGS_KEY,JSON.stringify({theme:document.documentElement.dataset.theme||"dark",storyId:currentStory.id||DEFAULT_STORY.id,mode,fontSize:els.fontSize.value,readerWidth:els.readerWidth.value,rate:els.rate.value,voice:els.voiceSelect.value||"",panelGap:els.panelGap.value,fitSelect:els.fitSelect.value,captionMode:els.captionMode.value,autoSpeed:els.autoSpeed.value}))}function applySettings(){const fs=els.fontSize.value||18,rw=els.readerWidth.value||920,gap=els.panelGap.value||10;document.documentElement.style.setProperty("--fontSize",fs+"px");document.documentElement.style.setProperty("--readerWidth",rw+"px");document.documentElement.style.setProperty("--panelGap",gap+"px");els.fontLabel.textContent=fs;els.widthLabel.textContent=rw;els.gapLabel.textContent=gap;els.rateLabel.textContent=Number(els.rate.value||1).toFixed(2)}function toggleTheme(){const cur=document.documentElement.dataset.theme||"dark";document.documentElement.dataset.theme=cur==="light"?"dark":"light";saveSettings()}function updateProgress(){const doc=document.documentElement,max=doc.scrollHeight-doc.clientHeight,pct=max>0?doc.scrollTop/max*100:0;els.progress.style.width=pct+"%"}function toast(msg){els.toast.textContent=msg;els.toast.classList.add("show");clearTimeout(window.__toastTimer);window.__toastTimer=setTimeout(()=>els.toast.classList.remove("show"),2400)}function trimSlashes(s){return String(s||"").replace(/^\/+|\/+$/g,"")}function sanitizeFilename(name){name=String(name||"chapter.json").replace(/[\\/:*?"<>|]+/g,"_");return name.toLowerCase().endsWith(".json")?name:name+".json"}function escapeHTML(str){return String(str??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
  </script>
